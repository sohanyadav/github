name: Apply Branch Protection

on:
  push:
    branches: [main]
    paths:
      - '.github/rulesets/**'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print rules without applying'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: read

jobs:
  # ── Job 1: Validate ruleset JSON ───────────────────────────────────────────
  validate:
    name: Validate Ruleset Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "Validating ruleset JSON files..."
          for f in .github/rulesets/*.json; do
            python3 -m json.tool "$f" > /dev/null && echo "  ✔ $f"
          done
          echo "All files are valid JSON."

  # ── Job 2: Apply branch protection via classic API (works on personal repos) ─
  apply-branch-protection:
    name: Apply Branch Protection
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Apply protection to main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          DRY_RUN:  ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          PAYLOAD=$(cat .github/rulesets/branch-protection.json)

          echo "Repository : $OWNER/$REPO"
          echo "Branch     : main"
          echo "Dry run    : $DRY_RUN"

          if [ "$DRY_RUN" = "true" ]; then
            echo ""
            echo "── DRY RUN — rules that would be applied ──"
            echo "$PAYLOAD" | python3 -m json.tool
            echo ""
            echo "Dry run complete. No changes applied."
            exit 0
          fi

          gh api repos/$OWNER/$REPO/branches/main/protection \
            --method PUT \
            --input .github/rulesets/branch-protection.json

          echo "✔ Branch protection applied to main."

      - name: Apply protection to dev
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          DRY_RUN:  ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run — skipping dev branch."
            exit 0
          fi

          # Ensure dev branch exists before applying protection
          if gh api repos/$OWNER/$REPO/branches/dev > /dev/null 2>&1; then
            gh api repos/$OWNER/$REPO/branches/dev/protection \
              --method PUT \
              --input .github/rulesets/branch-protection.json
            echo "✔ Branch protection applied to dev."
          else
            echo "⚠ dev branch does not exist yet — skipping."
          fi

  # ── Job 3: Verify protection is active ────────────────────────────────────
  verify:
    name: Verify Branch Protection
    runs-on: ubuntu-latest
    needs: apply-branch-protection
    steps:
      - name: Verify main branch protection
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          echo "── main branch protection ──"
          gh api repos/$OWNER/$REPO/branches/main/protection \
            --jq '{
              required_approvals: .required_pull_request_reviews.required_approving_review_count,
              dismiss_stale_reviews: .required_pull_request_reviews.dismiss_stale_reviews,
              require_status_checks: .required_status_checks.contexts,
              enforce_admins: .enforce_admins.enabled,
              allow_force_pushes: .allow_force_pushes.enabled,
              allow_deletions: .allow_deletions.enabled
            }'
          echo ""
          echo "✔ Verification complete."
