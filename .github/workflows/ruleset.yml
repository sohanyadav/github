name: Apply Repository Rulesets

on:
  # Run automatically when ruleset config files change
  push:
    branches: [main]
    paths:
      - '.github/rulesets/**'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print changes without applying'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: read
  administration: write    # required to manage branch protection & rulesets

jobs:
  # ── Job 1: Validate ruleset JSON files ─────────────────────────────────────
  validate:
    name: Validate Ruleset Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "Validating ruleset JSON files..."
          for f in .github/rulesets/*.json; do
            echo "  Checking $f"
            python3 -m json.tool "$f" > /dev/null && echo "  ✔ $f is valid"
          done
          echo "All ruleset files are valid JSON."

  # ── Job 2: Apply branch protection rulesets via GitHub API ─────────────────
  apply-rulesets:
    name: Apply Rulesets
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Apply main branch ruleset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN:  ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          RULESET_FILE=".github/rulesets/main-branch.json"

          echo "Repository : $OWNER/$REPO"
          echo "Ruleset    : $RULESET_FILE"
          echo "Dry run    : $DRY_RUN"

          if [ "$DRY_RUN" = "true" ]; then
            echo ""
            echo "── DRY RUN — ruleset that would be applied ──"
            cat "$RULESET_FILE"
            echo ""
            echo "Dry run complete. No changes applied."
            exit 0
          fi

          # Check if ruleset already exists
          EXISTING_ID=$(gh api \
            repos/$OWNER/$REPO/rulesets \
            --jq '.[] | select(.name == "main-branch-protection") | .id' 2>/dev/null || echo "")

          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing ruleset (ID: $EXISTING_ID)..."
            gh api repos/$OWNER/$REPO/rulesets/$EXISTING_ID \
              --method PUT \
              --input "$RULESET_FILE"
            echo "✔ Ruleset updated."
          else
            echo "Creating new ruleset..."
            gh api repos/$OWNER/$REPO/rulesets \
              --method POST \
              --input "$RULESET_FILE"
            echo "✔ Ruleset created."
          fi

      - name: Verify ruleset applied
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          echo "Active rulesets on $OWNER/$REPO:"
          gh api repos/$OWNER/$REPO/rulesets \
            --jq '.[] | "  [\(.id)] \(.name) — enforcement: \(.enforcement)"'

  # ── Job 3: Verify branch protection is active ──────────────────────────────
  verify-branch-protection:
    name: Verify Branch Protection
    runs-on: ubuntu-latest
    needs: apply-rulesets
    steps:
      - name: Check main branch protection
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          echo "Checking branch protection on: main"
          PROTECTION=$(gh api repos/$OWNER/$REPO/branches/main/protection 2>&1 || echo "NOT_PROTECTED")

          if echo "$PROTECTION" | grep -q "NOT_PROTECTED\|404"; then
            echo "⚠ main branch is NOT protected — check ruleset enforcement setting."
            exit 1
          fi

          echo "✔ main branch protection is active."
          echo ""
          echo "Required status checks:"
          echo "$PROTECTION" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          checks = data.get('required_status_checks', {}).get('contexts', [])
          for c in checks:
              print(f'  ✔ {c}')
          " 2>/dev/null || echo "  (none configured yet)"

          echo ""
          echo "Required reviews:"
          echo "$PROTECTION" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          reviews = data.get('required_pull_request_reviews', {})
          print(f'  Required approvals : {reviews.get(\"required_approving_review_count\", 0)}')
          print(f'  Dismiss stale      : {reviews.get(\"dismiss_stale_reviews\", False)}')
          print(f'  Require CODEOWNERS : {reviews.get(\"require_code_owner_reviews\", False)}')
          " 2>/dev/null || echo "  (not configured)"
