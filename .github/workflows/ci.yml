name: CI

# Lightweight entry-point that delegates to the reusable test workflow.
# Branch protection requires the "All Checks Passed" job from test.yml to pass.

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  # Quick sanity check — full testing runs in test.yml
  setup-check:
    name: Setup Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify project structure
        run: |
          echo "Checking required files..."
          for f in src/app.js src/math.js tests/math.test.js package.json; do
            [ -f "$f" ] && echo "  ✔ $f" || (echo "  ✘ $f missing" && exit 1)
          done
          echo "Project structure OK."
